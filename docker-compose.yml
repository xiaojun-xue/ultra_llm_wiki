services:
  # ── PostgreSQL + pgvector ──────────────────────
  postgres:
    # Use custom image for Chinese FTS: build: { context: ./scripts, dockerfile: Dockerfile.postgres }
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llm_wiki}
      POSTGRES_USER: ${POSTGRES_USER:-llm_wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./scripts/init_chinese_fts.sql:/docker-entrypoint-initdb.d/02_chinese_fts.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm_wiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── MinIO (S3-compatible file storage) ─────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI

  # ── Ollama (BGE-M3 Embedding) ──────────────────
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # ── Backend (FastAPI + MCP Server) ─────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      # ollama is optional - embedding will fail gracefully if unavailable
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-llm_wiki}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-llm_wiki}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      API_KEY: ${API_KEY:-change_me_in_production}
      MCP_PORT: "8001"
    ports:
      - "8000:8000"   # FastAPI
      - "8001:8001"   # MCP Server (SSE)

  # ── Web Frontend (Next.js) ──────────────────────
  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000

  # ── Nginx (Reverse Proxy) ──────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

volumes:
  pgdata:
  redis_data:
  minio_data:
  ollama_data:
